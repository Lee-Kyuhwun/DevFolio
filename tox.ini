[tox]
envlist = py311, py312, py313
isolated_build = true

[testenv]
extras = dev
commands =
    pytest {posargs:--cov=devfolio --cov-report=term-missing}

[testenv:lint]
extras = dev
commands =
    ruff check devfolio/ tests/
    ruff format --check devfolio/ tests/

[testenv:type]
extras = dev
deps = mypy>=1.10
commands =
    mypy devfolio/ --ignore-missing-imports
